name: Build

on: [push]

jobs:
  build:
    strategy:
      matrix:
        include:
          - name: Windows
            os: windows-latest
          - name: macOS
            os: macos-latest
            platform: mac-os
          - name: iOS
            os: macos-latest
            platform: ios
          - name: Linux
            os: ubuntu-latest
          - name: Android32
            os: ubuntu-latest
            platform: android32
          - name: Android64
            os: ubuntu-latest
            platform: android64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Android NDK
        if: matrix.platform == 'android32' || matrix.platform == 'android64'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Build with geode
        run: geode build ${{ matrix.platform && format('--platform {0}', matrix.platform) || '' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: neatgd-${{ matrix.name }}
          path: build/*.geode
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*.geode
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
